<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kaamera kaughaldus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
    header { background: #1a1a2e; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; flex: 1; }
    #status { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 4px; background: #333; }
    #status.ok { background: #1a5c1a; }
    #status.err { background: #5c1a1a; }
    #status.warn { background: #5c4a00; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem; }
    .card { background: #1e1e2e; border-radius: 8px; padding: 1.5rem; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 0.8rem; }
    .card h2 { font-size: 0.95rem; color: #aaa; margin-bottom: 0.2rem; }
    label { font-size: 0.85rem; color: #aaa; }
    input, select { padding: 0.55rem 0.7rem; border-radius: 4px; border: 1px solid #444; background: #111; color: #eee; width: 100%; }
    .row { display: flex; gap: 0.5rem; }
    .row input { flex: 1; }
    button { padding: 0.55rem 1rem; border-radius: 4px; border: none; background: #2a2a4e; color: #eee; cursor: pointer; white-space: nowrap; }
    button.primary { background: #3a7bd5; }
    button:hover { filter: brightness(1.2); }
    #viewer { display: none; flex-direction: column; align-items: center; gap: 0.8rem; width: 100%; }
    #stream-img { max-width: 100%; border-radius: 6px; border: 1px solid #333; background: #000; min-height: 200px; }
    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    #probe-result { font-size: 0.8rem; color: #6f6; padding: 0.4rem; background: #0a2a0a; border-radius: 4px; display: none; word-break: break-all; }
    #probe-error { font-size: 0.8rem; color: #f66; padding: 0.4rem; background: #2a0a0a; border-radius: 4px; display: none; }
  </style>
</head>
<body>
<header>
  <h1>Kaamera kaughaldus</h1>
  <span id="status">ühendamata</span>
</header>
<main>

  <!-- Login -->
  <div class="card" id="login-card">
    <h2>Logi sisse</h2>
    <label>API võti</label>
    <input type="password" id="api-key" placeholder="sinu-api-võti" autocomplete="current-password">

    <h2 style="margin-top:0.5rem">Kaamera allikas</h2>

    <div style="display:flex;gap:0.5rem;align-items:center">
      <label style="white-space:nowrap"><input type="radio" name="src-type" value="rtsp" checked onchange="toggleSrc()"> IP-kaamera (RTSP)</label>
      <label style="white-space:nowrap"><input type="radio" name="src-type" value="usb" onchange="toggleSrc()"> USB-kaamera</label>
    </div>

    <!-- RTSP -->
    <div id="rtsp-fields">
      <label>Kaamera IP</label>
      <div class="row">
        <input id="cam-ip" placeholder="192.168.1.x" style="flex:2">
        <input id="cam-port" placeholder="554" value="554" style="flex:1">
      </div>
      <label>Kasutaja / Parool</label>
      <div class="row">
        <input id="cam-user" placeholder="admin" value="admin">
        <input id="cam-pass" type="password" placeholder="admin" value="admin">
      </div>
      <button class="primary" onclick="probeAndConnect()">Otsi ja ühenda</button>
      <div id="probe-result"></div>
      <div id="probe-error"></div>
    </div>

    <!-- USB -->
    <div id="usb-fields" style="display:none">
      <label>Kaamera indeks</label>
      <input id="usb-index" value="0" type="number" min="0" max="7">
      <button class="primary" onclick="connectUsb()">Ühenda</button>
    </div>
  </div>

  <!-- Voog -->
  <div id="viewer">
    <div class="toolbar">
      <button onclick="takeSnapshot()">Snapshot</button>
      <button onclick="disconnect()">Lahku</button>
    </div>
    <img id="stream-img" alt="stream">
  </div>

</main>
<script>
  let apiKey = '';
  let camKey = '';

  function qs(p) { return `${p.includes('?')?'&':'?'}api_key=${encodeURIComponent(apiKey)}`; }
  async function apiFetch(path, opts = {}) { return fetch(path + qs(path), opts); }

  function toggleSrc() {
    const v = document.querySelector('input[name=src-type]:checked').value;
    document.getElementById('rtsp-fields').style.display = v === 'rtsp' ? '' : 'none';
    document.getElementById('usb-fields').style.display = v === 'usb' ? '' : 'none';
  }

  async function probeAndConnect() {
    apiKey = document.getElementById('api-key').value.trim();
    const ip = document.getElementById('cam-ip').value.trim();
    const port = document.getElementById('cam-port').value.trim() || '554';
    const user = document.getElementById('cam-user').value.trim();
    const pass = document.getElementById('cam-pass').value;
    if (!ip) { showErr('Sisesta kaamera IP-aadress'); return; }
    setStatus('otsin RTSP rada...', 'warn');
    document.getElementById('probe-result').style.display = 'none';
    document.getElementById('probe-error').style.display = 'none';
    const res = await apiFetch(`/probe?ip=${encodeURIComponent(ip)}&user=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&port=${port}`);
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      showErr(d.detail || 'Ühendus ebaõnnestus — kontrolli IP-d ja parooli');
      setStatus('viga', 'err');
      return;
    }
    const data = await res.json();
    camKey = data.internal_key;
    document.getElementById('probe-result').textContent = 'Leitud: ' + data.url;
    document.getElementById('probe-result').style.display = 'block';
    startViewer();
  }

  async function connectUsb() {
    apiKey = document.getElementById('api-key').value.trim();
    camKey = document.getElementById('usb-index').value;
    startViewer();
  }

  function startViewer() {
    setStatus('ühendatud', 'ok');
    document.getElementById('login-card').style.display = 'none';
    const v = document.getElementById('viewer');
    v.style.display = 'flex';
    document.getElementById('stream-img').src =
      `/stream?key=${encodeURIComponent(camKey)}&api_key=${encodeURIComponent(apiKey)}`;
  }

  async function takeSnapshot() {
    const res = await apiFetch(`/snapshot?key=${encodeURIComponent(camKey)}`);
    if (!res.ok) return;
    const blob = await res.blob();
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: `snapshot_${Date.now()}.jpg`,
    });
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function disconnect() {
    document.getElementById('stream-img').src = '';
    document.getElementById('viewer').style.display = 'none';
    document.getElementById('login-card').style.display = 'flex';
    setStatus('ühendamata', null);
    apiKey = ''; camKey = '';
  }

  function setStatus(msg, state) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = state || '';
  }

  function showErr(msg) {
    const el = document.getElementById('probe-error');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
