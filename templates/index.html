<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nutikodu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; color: #eee; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a1a2e; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1rem; }
    #logout-btn { display: none; padding: 0.4rem 0.9rem; border-radius: 4px; border: none; background: #3a3a5e; color: #eee; cursor: pointer; }
    #logout-btn:hover { background: #5c1a1a; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #1e1e2e; border-radius: 10px; padding: 2rem; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 1rem; }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.2rem; }
    label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 0.3rem; }
    input { padding: 0.6rem 0.8rem; border-radius: 5px; border: 1px solid #444; background: #111; color: #eee; width: 100%; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #3a7bd5; }
    button.primary { padding: 0.7rem; border-radius: 5px; border: none; background: #3a7bd5; color: #fff; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 0.3rem; }
    button.primary:hover { background: #2e6bc4; }
    #error { font-size: 0.85rem; color: #f66; background: #2a0a0a; padding: 0.5rem 0.8rem; border-radius: 4px; display: none; }
    #viewer { display: none; flex-direction: column; align-items: center; gap: 1rem; width: 100%; max-width: 960px; }
    #stream-img { width: 100%; border-radius: 8px; border: 1px solid #333; background: #000; }
    #status { font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
<header>
  <h1>Nutikodu</h1>
  <button id="logout-btn" onclick="doLogout()">Logi välja</button>
</header>
<main>
  <div class="card" id="login-card">
    <h2>Logi sisse</h2>
    <div>
      <label>Kasutajanimi</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div>
      <label>Parool</label>
      <input type="password" id="password" placeholder="parool" autocomplete="current-password">
    </div>
    <div id="error"></div>
    <button class="primary" onclick="doLogin()">Logi sisse</button>
  </div>

  <div id="viewer">
    <span id="status">Laen kaamerat...</span>
    <img id="stream-img" alt="kaamera voog">
  </div>
</main>
<script>
  let token = '';
  let camKey = '';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';
    if (!username || !password) { showErr('Sisesta kasutajanimi ja parool'); return; }
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!res.ok) {
      const d = await res.json().catch(() => ({}));
      showErr(d.detail || 'Sisselogimine ebaõnnestus');
      return;
    }
    const data = await res.json();
    token = data.token;
    camKey = data.cam_key;
    sessionStorage.setItem('token', token);
    sessionStorage.setItem('cam_key', camKey);
    showCamera();
  }

  function showCamera() {
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'block';
    const viewer = document.getElementById('viewer');
    viewer.style.display = 'flex';
    const img = document.getElementById('stream-img');
    img.src = `/stream?key=${encodeURIComponent(camKey)}&api_key=${encodeURIComponent(token)}`;
    img.onload = () => { document.getElementById('status').style.display = 'none'; };
  }

  async function doLogout() {
    if (token) await fetch('/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }) });
    token = ''; camKey = '';
    sessionStorage.clear();
    document.getElementById('stream-img').src = '';
    document.getElementById('viewer').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
    document.getElementById('login-card').style.display = 'flex';
    document.getElementById('password').value = '';
  }

  function showErr(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Taasta sessioon leheksiirde pärast
  const savedToken = sessionStorage.getItem('token');
  const savedKey = sessionStorage.getItem('cam_key');
  if (savedToken && savedKey) {
    token = savedToken;
    camKey = savedKey;
    showCamera();
  }
</script>
</body>
</html>
