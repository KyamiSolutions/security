<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nutikodu</title>
<style>
:root {
  --bg: #0d0d1a;
  --surface: #13131f;
  --surface2: #1c1c2e;
  --surface3: #242438;
  --border: #2e2e4a;
  --text: #eaeaf5;
  --muted: #6a6a90;
  --accent: #7c3aed;
  --accent-h: #6d28d9;
  --accent-glow: rgba(124,58,237,0.25);
  --green: #22c55e;
  --red: #ef4444;
  --sidebar: 230px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; cursor: default; }
a { color: inherit; text-decoration: none; }
img { cursor: default; }

/* ════════════════════ LOGIN ════════════════════ */
#login-page {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  background: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.12) 0%, transparent 70%);
}
.lcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem 2.25rem;
  width: 100%; max-width: 360px;
  display: flex; flex-direction: column; gap: 1.5rem;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 0 1px rgba(124,58,237,0.08);
}
.lbrand {
  display: flex; align-items: center; gap: 0.9rem;
}
.lbrand-icon {
  width: 46px; height: 46px;
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  box-shadow: 0 4px 16px rgba(124,58,237,0.4);
}
.lbrand-text { display: flex; flex-direction: column; gap: 2px; }
.lbrand-name { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
.lbrand-sub { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.3px; }

.lfields { display: flex; flex-direction: column; gap: 0.9rem; }
.lfield { display: flex; flex-direction: column; gap: 0.35rem; }
.lfield label { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.lfield input {
  padding: 0.7rem 1rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.lfield input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.lbtn {
  padding: 0.8rem 1.5rem;
  border-radius: 10px; border: none;
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: #fff; font-size: 1rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.2px;
  box-shadow: 0 4px 16px rgba(124,58,237,0.35);
  transition: opacity 0.15s, transform 0.1s;
}
.lbtn:hover { opacity: 0.92; }
.lbtn:active { transform: scale(0.98); }
.lerr {
  font-size: 0.83rem; color: #fca5a5;
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 8px; padding: 0.55rem 0.9rem;
  display: none;
}

/* ════════════════════ APP SHELL ════════════════════ */
#app { display: none; }

/* Sidebar */
.sb {
  position: fixed; inset: 0 auto 0 0;
  width: var(--sidebar);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  z-index: 100;
}
.sb-brand {
  padding: 1.25rem 1rem 1.1rem;
  display: flex; align-items: center; gap: 0.75rem;
  border-bottom: 1px solid var(--border);
}
.sb-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem; flex-shrink: 0;
}
.sb-title { font-weight: 800; font-size: 0.95rem; letter-spacing: -0.3px; }

.sb-nav { flex: 1; padding: 0.75rem 0.6rem; display: flex; flex-direction: column; gap: 3px; }
.sb-section { font-size: 0.65rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 0.5rem 0.7rem 0.25rem; margin-top: 0.25rem; }
.nav-btn {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.65rem 0.85rem; border-radius: 10px;
  cursor: pointer; font-size: 0.88rem; color: var(--muted);
  transition: background 0.12s, color 0.12s;
  user-select: none;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.on {
  background: var(--surface2);
  color: var(--text); font-weight: 600;
  box-shadow: inset 3px 0 0 var(--accent);
}
.nav-btn .ni { font-size: 1.05rem; width: 1.3rem; text-align: center; flex-shrink: 0; }
.nbadge {
  margin-left: auto;
  background: var(--accent); color: #fff;
  font-size: 0.65rem; font-weight: 800;
  padding: 0.1rem 0.45rem; border-radius: 99px;
  min-width: 18px; text-align: center;
  display: none;
}

.sb-foot {
  padding: 0.9rem 0.8rem;
  border-top: 1px solid var(--border);
}
.sb-user {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.5rem 0.6rem; border-radius: 9px;
  cursor: pointer; transition: background 0.12s;
  font-size: 0.83rem; color: var(--muted);
}
.sb-user:hover { background: var(--surface2); color: var(--text); }
.sb-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; flex-shrink: 0;
}

/* Main */
.main {
  margin-left: var(--sidebar);
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.topbar {
  display: none;
  align-items: center; gap: 0.75rem;
  padding: 0.8rem 1rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.topbar-brand { font-weight: 800; font-size: 0.95rem; flex: 1; }

/* Pages */
.page { display: none; flex: 1; padding: 1.75rem; }
.page.on { display: block; }
.page-header { margin-bottom: 1.5rem; }
.page-title { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.3px; }
.page-sub { font-size: 0.83rem; color: var(--muted); margin-top: 0.25rem; }

/* ── Camera ── */
.cam-wrap {
  background: #000;
  border-radius: 14px; overflow: hidden;
  border: 1px solid var(--border);
  position: relative; max-width: 960px;
}
.cam-wrap img { display: block; width: 100%; min-height: 240px; cursor: default; }
.cam-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
}
.cam-pill {
  position: absolute; top: 1rem; left: 1rem;
  display: flex; align-items: center; gap: 0.45rem;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  padding: 0.3rem 0.75rem; border-radius: 99px;
  font-size: 0.75rem; font-weight: 600;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.live-dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
.cam-bar {
  display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap;
}

/* ── Cards (buttons) ── */
.btn-outline {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.5rem 1rem; border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--surface2); color: var(--text);
  font-size: 0.85rem; font-weight: 500; cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.btn-outline:hover { background: var(--surface3); border-color: var(--muted); }
.btn-red { border-color: rgba(239,68,68,0.4); color: #f87171; }
.btn-red:hover { background: rgba(239,68,68,0.1); }

/* ── Setup card ── */
.setup-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.5rem; max-width: 500px;
  display: flex; flex-direction: column; gap: 1rem;
}
.setup-box h3 { font-size: 1rem; font-weight: 700; }
.frow { display: flex; gap: 0.6rem; }
.frow .fgrp { flex: 1; }
.fgrp { display: flex; flex-direction: column; gap: 0.35rem; }
.fgrp label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
.inp {
  padding: 0.6rem 0.85rem; border-radius: 9px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 0.9rem; outline: none; width: 100%;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
select.inp { cursor: pointer; }
.pmsg { font-size: 0.82rem; padding: 0.5rem 0.8rem; border-radius: 8px; display: none; }
.pmsg.ok { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.25); color: #86efac; }
.pmsg.err { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
.btn-primary {
  padding: 0.65rem 1.25rem; border-radius: 9px; border: none;
  background: linear-gradient(135deg, #7c3aed, #5b21b6);
  color: #fff; font-size: 0.9rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 12px rgba(124,58,237,0.3);
  transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.88; }

/* ── Recordings ── */
.rec-grid {
  display: grid; gap: 0.75rem;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.rec-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.1rem 1.25rem;
  display: flex; flex-direction: column; gap: 0.65rem;
  transition: border-color 0.15s;
}
.rec-card:hover { border-color: var(--muted); }
.rec-name { font-size: 0.88rem; font-weight: 700; color: var(--text); }
.rec-meta { font-size: 0.75rem; color: var(--muted); }
.rec-actions { display: flex; gap: 0.5rem; }

/* ── Devices ── */
.dev-grid {
  display: grid; gap: 0.75rem;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  margin-bottom: 1.75rem;
}
.dev-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.1rem 1.25rem;
  display: flex; flex-direction: column; gap: 0.7rem;
  transition: border-color 0.15s;
}
.dev-card:hover { border-color: var(--muted); }
.dev-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
.dev-info { min-width: 0; }
.dev-name { font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dev-kind { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.dev-ip { font-size: 0.75rem; color: var(--muted); }
.toggle {
  width: 46px; height: 26px; border-radius: 13px; border: none;
  background: var(--surface3); cursor: pointer; position: relative;
  flex-shrink: 0; transition: background 0.2s;
}
.toggle::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px; border-radius: 50%; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  transition: transform 0.2s;
}
.toggle.on { background: var(--accent); }
.toggle.on::after { transform: translateX(20px); }

.empty { color: var(--muted); font-size: 0.9rem; padding: 0.5rem 0; }

/* ── Mobile ── */
.mob-nav {
  display: none; position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  z-index: 100;
}
.mob-nav-inner { display: flex; }
.mob-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 0.6rem 0; cursor: pointer; color: var(--muted);
  font-size: 0.65rem; gap: 0.2rem; transition: color 0.12s;
  position: relative; user-select: none;
}
.mob-btn .mi { font-size: 1.3rem; }
.mob-btn.on { color: var(--accent); }
.mob-badge {
  position: absolute; top: 5px; right: calc(50% - 16px);
  background: var(--accent); color: #fff;
  font-size: 0.6rem; font-weight: 800;
  min-width: 16px; padding: 0 3px; text-align: center;
  border-radius: 99px; display: none;
}

@media (max-width: 700px) {
  .sb { display: none; }
  .topbar { display: flex; }
  .main { margin-left: 0; padding-bottom: 70px; }
  .page { padding: 1rem; }
  .mob-nav { display: block; }
}
@media (max-width: 440px) {
  .rec-grid, .dev-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-page">
  <div class="lcard">
    <div class="lbrand">
      <div class="lbrand-icon">🔒</div>
      <div class="lbrand-text">
        <div class="lbrand-name">Nutikodu</div>
        <div class="lbrand-sub">Turvakaamera süsteem</div>
      </div>
    </div>
    <div class="lfields">
      <div class="lfield">
        <label>Kasutajanimi</label>
        <input type="text" id="lu" autocomplete="username" placeholder="admin">
      </div>
      <div class="lfield">
        <label>Parool</label>
        <input type="password" id="lp" autocomplete="current-password" placeholder="••••••••">
      </div>
    </div>
    <div class="lerr" id="lerr"></div>
    <button class="lbtn" onclick="doLogin()">Sisene →</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">

  <!-- Sidebar -->
  <aside class="sb">
    <div class="sb-brand">
      <div class="sb-icon">🔒</div>
      <div class="sb-title">Nutikodu</div>
    </div>
    <nav class="sb-nav">
      <div class="sb-section">Vaated</div>
      <div class="nav-btn on" id="snav-camera" onclick="go('camera')">
        <span class="ni">📹</span> Kaamera
      </div>
      <div class="nav-btn" id="snav-recordings" onclick="go('recordings')">
        <span class="ni">🎬</span> Salvestused
        <span class="nbadge" id="sbadge"></span>
      </div>
      <div class="nav-btn" id="snav-devices" onclick="go('devices')">
        <span class="ni">💡</span> Seadmed
      </div>
    </nav>
    <div class="sb-foot">
      <div class="sb-user" onclick="doLogout()">
        <div class="sb-avatar">👤</div>
        <span id="sb-username">admin</span>
        <span style="margin-left:auto;font-size:0.8rem">→ Välju</span>
      </div>
    </div>
  </aside>

  <!-- Mobile topbar -->
  <div class="topbar">
    <div class="sb-icon" style="width:30px;height:30px;border-radius:8px;font-size:0.95rem;flex-shrink:0">🔒</div>
    <div class="topbar-brand">Nutikodu</div>
    <button class="btn-outline" style="padding:0.35rem 0.7rem;font-size:0.78rem" onclick="doLogout()">Välju</button>
  </div>

  <!-- Content -->
  <div class="main">

    <!-- Camera -->
    <div class="page on" id="page-camera">
      <div class="page-header">
        <div class="page-title">Kaamera</div>
        <div class="page-sub">Live vaade ja salvestamine</div>
      </div>

      <div id="live-view" style="display:none">
        <div class="cam-wrap">
          <img id="stream-img" alt="">
          <div class="cam-overlay">
            <div class="cam-pill">
              <div class="live-dot" id="ldot"></div>
              <span id="lstatus">Live</span>
            </div>
          </div>
        </div>
        <div class="cam-bar">
          <button class="btn-outline" onclick="doSnapshot()">📷 Snapshot</button>
        </div>
      </div>

      <div id="setup-view" class="setup-box">
        <h3>Ühenda IP-kaamera</h3>
        <div class="frow">
          <div class="fgrp" style="flex:2">
            <label>IP-aadress</label>
            <input class="inp" id="ci" placeholder="192.168.1.x">
          </div>
          <div class="fgrp" style="flex:1">
            <label>Port</label>
            <input class="inp" id="cp" value="554">
          </div>
        </div>
        <div class="frow">
          <div class="fgrp">
            <label>Kasutaja</label>
            <input class="inp" id="cu" value="admin">
          </div>
          <div class="fgrp">
            <label>Parool</label>
            <input class="inp" type="password" id="cw">
          </div>
        </div>
        <button class="btn-primary" onclick="doProbe()">🔍 Otsi ja ühenda</button>
        <div class="pmsg" id="pmsg"></div>
      </div>
    </div>

    <!-- Recordings -->
    <div class="page" id="page-recordings">
      <div class="page-header">
        <div class="page-title">Salvestused</div>
        <div class="page-sub" id="rec-count">Laen...</div>
      </div>
      <div class="rec-grid" id="rec-grid"></div>
    </div>

    <!-- Devices -->
    <div class="page" id="page-devices">
      <div class="page-header">
        <div class="page-title">Nutikodu seadmed</div>
        <div class="page-sub">Shelly, Tasmota ja HTTP seadmed</div>
      </div>
      <div class="dev-grid" id="dev-grid"></div>
      <div class="setup-box">
        <h3>Lisa uus seade</h3>
        <div class="fgrp">
          <label>Nimi</label>
          <input class="inp" id="dn" placeholder="Elutoa lamp">
        </div>
        <div class="fgrp">
          <label>Tüüp</label>
          <select class="inp" id="dk">
            <option value="shelly">Shelly</option>
            <option value="tasmota">Tasmota</option>
            <option value="http">HTTP</option>
          </select>
        </div>
        <div class="frow">
          <div class="fgrp" style="flex:2">
            <label>IP-aadress</label>
            <input class="inp" id="di" placeholder="192.168.1.x">
          </div>
          <div class="fgrp" style="flex:1">
            <label>Port</label>
            <input class="inp" id="dport" value="80">
          </div>
        </div>
        <button class="btn-primary" onclick="addDevice()">+ Lisa seade</button>
      </div>
    </div>

  </div><!-- /main -->

  <!-- Mobile nav -->
  <div class="mob-nav">
    <div class="mob-nav-inner">
      <div class="mob-btn on" id="mnav-camera" onclick="go('camera')">
        <span class="mi">📹</span><span>Kaamera</span>
      </div>
      <div class="mob-btn" id="mnav-recordings" onclick="go('recordings')">
        <span class="mi">🎬</span><span>Salvestused</span>
        <span class="mob-badge" id="mbadge"></span>
      </div>
      <div class="mob-btn" id="mnav-devices" onclick="go('devices')">
        <span class="mi">💡</span><span>Seadmed</span>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
'use strict';
let camKey = '';
let currentPage = 'camera';

// ── Login / Logout ──────────────────────────────────────────────────────────

async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  const err = document.getElementById('lerr');
  err.style.display = 'none';
  const fd = new FormData();
  fd.append('username', u);
  fd.append('password', p);
  const res = await fetch('/login', { method: 'POST', body: fd });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    err.textContent = data.detail || 'Sisselogimine ebaõnnestus';
    err.style.display = 'block';
    return;
  }
  camKey = data.cam_key || '';
  sessionStorage.setItem('camKey', camKey);
  document.getElementById('sb-username').textContent = u || 'admin';
  showApp();
}

async function doLogout() {
  await fetch('/logout', { method: 'POST' });
  sessionStorage.clear();
  location.reload();
}

document.getElementById('lp').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('lu').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('lp').focus(); });

// ── App show ────────────────────────────────────────────────────────────────

function showApp() {
  document.getElementById('login-page').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'block';
  if (camKey) {
    document.getElementById('setup-view').style.display = 'none';
    document.getElementById('live-view').style.display = 'block';
    const img = document.getElementById('stream-img');
    img.src = '/stream?key=' + encodeURIComponent(camKey);
    img.onerror = () => {
      document.getElementById('ldot').className = 'live-dot off';
      document.getElementById('lstatus').textContent = 'Ühendus katkes';
    };
  }
  loadRecordings();
  loadDevices();
}

// ── Navigation ───────────────────────────────────────────────────────────────

function go(name) {
  currentPage = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('on'));
  document.querySelectorAll('.mob-btn').forEach(n => n.classList.remove('on'));
  document.getElementById('page-' + name).classList.add('on');
  document.getElementById('snav-' + name).classList.add('on');
  document.getElementById('mnav-' + name).classList.add('on');
  if (name === 'recordings') loadRecordings();
  if (name === 'devices') loadDevices();
}

// ── Camera ───────────────────────────────────────────────────────────────────

async function doProbe() {
  const ip = document.getElementById('ci').value.trim();
  const port = document.getElementById('cp').value || '554';
  const user = document.getElementById('cu').value.trim();
  const pass = document.getElementById('cw').value;
  const msg = document.getElementById('pmsg');
  msg.className = 'pmsg'; msg.textContent = '⏳ Otsin RTSP rada...'; msg.style.display = 'block';
  const res = await fetch(`/probe?ip=${encodeURIComponent(ip)}&user=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&port=${port}`);
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    msg.className = 'pmsg err'; msg.textContent = data.detail || 'Ühendus ebaõnnestus';
    return;
  }
  camKey = data.internal_key;
  sessionStorage.setItem('camKey', camKey);
  msg.className = 'pmsg ok'; msg.textContent = '✓ Leitud: ' + data.url;
  document.getElementById('setup-view').style.display = 'none';
  document.getElementById('live-view').style.display = 'block';
  document.getElementById('stream-img').src = '/stream?key=' + encodeURIComponent(camKey);
}

async function doSnapshot() {
  const res = await fetch('/snapshot?key=' + encodeURIComponent(camKey));
  if (!res.ok) return;
  const blob = await res.blob();
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: 'snapshot_' + Date.now() + '.jpg',
  });
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Recordings ───────────────────────────────────────────────────────────────

async function loadRecordings() {
  const res = await fetch('/recordings');
  if (!res.ok) return;
  const list = await res.json();
  const count = list.length;
  const subEl = document.getElementById('rec-count');
  subEl.textContent = count ? count + ' salvestust' : 'Ühtegi salvestust pole veel';
  ['sbadge', 'mbadge'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = count; el.style.display = count ? 'inline' : 'none';
  });
  const grid = document.getElementById('rec-grid');
  if (!count) { grid.innerHTML = '<div class="empty">Liikumisest salvestusi pole veel tekkinud.</div>'; return; }
  grid.innerHTML = list.map(r => {
    const d = new Date(r.mtime * 1000).toLocaleString('et-EE');
    const mb = (r.size / 1048576).toFixed(1);
    return `<div class="rec-card">
      <div class="rec-name">🎬 ${r.filename}</div>
      <div class="rec-meta">${d} &middot; ${mb} MB</div>
      <div class="rec-actions">
        <a class="btn-outline" style="font-size:0.8rem" href="/recordings/${encodeURIComponent(r.filename)}" download>⬇ Lae alla</a>
        <button class="btn-outline btn-red" style="font-size:0.8rem" onclick="delRec('${r.filename}')">🗑 Kustuta</button>
      </div>
    </div>`;
  }).join('');
}

async function delRec(fn) {
  if (!confirm('Kustutan salvestuse ' + fn + '?')) return;
  await fetch('/recordings/' + encodeURIComponent(fn), { method: 'DELETE' });
  loadRecordings();
}

// ── Devices ──────────────────────────────────────────────────────────────────

async function loadDevices() {
  const res = await fetch('/devices');
  if (!res.ok) return;
  const devs = await res.json();
  const grid = document.getElementById('dev-grid');
  if (!devs.length) { grid.innerHTML = '<div class="empty">Seadmeid pole lisatud.</div>'; return; }
  grid.innerHTML = devs.map(d => `<div class="dev-card">
    <div class="dev-top">
      <div class="dev-info">
        <div class="dev-name">${d.name}</div>
        <div class="dev-kind">${d.kind}</div>
      </div>
      <button class="toggle ${d.state ? 'on' : ''}" onclick="toggleDev('${d.id}', this)" title="Lülita"></button>
    </div>
    <div class="dev-ip">${d.ip}:${d.port}</div>
    <button class="btn-outline btn-red" style="font-size:0.78rem;align-self:flex-start" onclick="delDev('${d.id}')">Eemalda</button>
  </div>`).join('');
}

async function toggleDev(id, btn) {
  const res = await fetch('/devices/' + id + '/toggle', { method: 'POST' });
  if (!res.ok) return;
  const d = await res.json();
  btn.classList.toggle('on', !!d.state);
}

async function addDevice() {
  const fd = new FormData();
  fd.append('name', document.getElementById('dn').value.trim());
  fd.append('kind', document.getElementById('dk').value);
  fd.append('ip', document.getElementById('di').value.trim());
  fd.append('port', document.getElementById('dport').value || '80');
  if (!fd.get('name') || !fd.get('ip')) return;
  const res = await fetch('/devices', { method: 'POST', body: fd });
  if (!res.ok) return;
  document.getElementById('dn').value = '';
  document.getElementById('di').value = '';
  loadDevices();
}

async function delDev(id) {
  if (!confirm('Eemaldan seadme?')) return;
  await fetch('/devices/' + id, { method: 'DELETE' });
  loadDevices();
}

// ── Session restore ───────────────────────────────────────────────────────────
(async () => {
  const res = await fetch('/recordings');
  if (res.ok) {
    camKey = sessionStorage.getItem('camKey') || '';
    showApp();
  }
})();
</script>
</body>
</html>
