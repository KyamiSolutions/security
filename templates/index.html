<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kaamera kaughaldus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
    header { background: #1a1a2e; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; flex: 1; }
    #status { font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 4px; background: #333; }
    #status.ok { background: #1a5c1a; }
    #status.err { background: #5c1a1a; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1rem; padding: 1.5rem; }
    #login { background: #1e1e2e; border-radius: 8px; padding: 2rem; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 0.8rem; }
    #login input { padding: 0.6rem; border-radius: 4px; border: 1px solid #444; background: #111; color: #eee; }
    #login button { padding: 0.6rem; border-radius: 4px; border: none; background: #3a7bd5; color: #fff; cursor: pointer; }
    #viewer { display: none; flex-direction: column; align-items: center; gap: 1rem; width: 100%; }
    #stream-img { max-width: 100%; border-radius: 6px; border: 1px solid #333; background: #000; }
    .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .controls button { padding: 0.4rem 0.9rem; border-radius: 4px; border: none; background: #2a2a3e; color: #eee; cursor: pointer; }
    .controls button:hover { background: #3a7bd5; }
    #cam-select { padding: 0.4rem 0.8rem; border-radius: 4px; border: 1px solid #444; background: #1e1e2e; color: #eee; }
    #v4l2-panel { background: #1e1e2e; border-radius: 6px; padding: 1rem; width: 100%; max-width: 600px; display: none; }
    #v4l2-panel h3 { font-size: 0.9rem; margin-bottom: 0.6rem; color: #aaa; }
    .ctrl-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .ctrl-row label { width: 160px; font-size: 0.85rem; }
    .ctrl-row input[type=range] { flex: 1; }
    .ctrl-row span { width: 40px; text-align: right; font-size: 0.85rem; }
  </style>
</head>
<body>
<header>
  <h1>Kaamera kaughaldus</h1>
  <span id="status">ühendamata</span>
</header>
<main>
  <div id="login">
    <label>API võti</label>
    <input type="password" id="api-key" placeholder="sinu-api-võti" autocomplete="current-password">
    <select id="cam-select"><option value="0">Kaamera 0</option></select>
    <button onclick="connect()">Ühenda</button>
  </div>

  <div id="viewer">
    <div class="controls">
      <select id="cam-switch" onchange="switchCamera(this.value)"></select>
      <button onclick="takeSnapshot()">Snapshot</button>
      <button onclick="toggleControls()">Seaded</button>
      <button onclick="disconnect()">Lahku</button>
    </div>
    <img id="stream-img" alt="stream">
    <div id="v4l2-panel">
      <h3>Kaamera seaded (v4l2)</h3>
      <div id="ctrl-rows"></div>
    </div>
  </div>
</main>

<script>
  let apiKey = '';
  let camIndex = 0;

  async function apiFetch(path, opts = {}) {
    const sep = path.includes('?') ? '&' : '?';
    return fetch(`${path}${sep}api_key=${encodeURIComponent(apiKey)}`, opts);
  }

  async function connect() {
    apiKey = document.getElementById('api-key').value.trim();
    camIndex = parseInt(document.getElementById('cam-select').value);
    const res = await apiFetch('/cameras');
    if (!res.ok) { setStatus('Vale võti', false); return; }
    const data = await res.json();
    setStatus('ühendatud', true);
    document.getElementById('login').style.display = 'none';
    const viewer = document.getElementById('viewer');
    viewer.style.display = 'flex';
    const sw = document.getElementById('cam-switch');
    sw.innerHTML = data.cameras.map(i => `<option value="${i}" ${i===camIndex?'selected':''}>Kaamera ${i}</option>`).join('');
    loadStream();
    loadControls();
  }

  function loadStream() {
    const img = document.getElementById('stream-img');
    img.src = `/stream/${camIndex}?api_key=${encodeURIComponent(apiKey)}`;
  }

  function switchCamera(idx) {
    camIndex = parseInt(idx);
    loadStream();
    loadControls();
  }

  async function takeSnapshot() {
    const res = await apiFetch(`/snapshot/${camIndex}`);
    if (!res.ok) return;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `snapshot_${Date.now()}.jpg`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function loadControls() {
    const res = await apiFetch(`/controls/${camIndex}`);
    if (!res.ok) return;
    const data = await res.json();
    const rows = document.getElementById('ctrl-rows');
    rows.innerHTML = '';
    for (const [name, val] of Object.entries(data.controls)) {
      const row = document.createElement('div');
      row.className = 'ctrl-row';
      row.innerHTML = `
        <label>${name}</label>
        <input type="range" min="0" max="255" value="${val}" oninput="this.nextElementSibling.textContent=this.value" onchange="setControl('${name}',this.value)">
        <span>${val}</span>`;
      rows.appendChild(row);
    }
  }

  async function setControl(name, value) {
    await apiFetch(`/controls/${camIndex}?control=${encodeURIComponent(name)}&value=${value}`, { method: 'POST' });
  }

  function toggleControls() {
    const panel = document.getElementById('v4l2-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }

  function disconnect() {
    document.getElementById('stream-img').src = '';
    document.getElementById('viewer').style.display = 'none';
    document.getElementById('login').style.display = 'flex';
    setStatus('ühendamata', null);
    apiKey = '';
  }

  function setStatus(msg, ok) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = ok === true ? 'ok' : ok === false ? 'err' : '';
  }
</script>
</body>
</html>
