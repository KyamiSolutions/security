version: '3'

services:
  gladys:
    image: gladysassistant/gladys:v4
    container_name: gladys
    restart: always
    privileged: true
    network_mode: host
    cgroup: host
    logging:
      driver: 'json-file'
      options:
        max-size: 10m
    environment:
      NODE_ENV: production
      SQLITE_FILE_PATH: /var/lib/gladysassistant/gladys-production.db
      SERVER_PORT: 80
      TZ: Europe/Paris
      # Optional: paste a Discord webhook URL here to get a photo notification
      # whenever kyami-motion detects motion (Server Settings > Integrations > Webhooks).
      DISCORD_WEBHOOK_URL: ''
      # Optional: free AI chat without a Gladys Plus subscription. Get a free key at
      # https://console.groq.com/keys and paste it here to enable the AI chat feature.
      GROQ_API_KEY: ''
      # Optional fallback if GROQ_API_KEY is empty: free key at https://aistudio.google.com/apikey
      GEMINI_API_KEY: ''
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/gladysassistant:/var/lib/gladysassistant
      - /dev:/dev
      - /run/udev:/run/udev:ro
  watchtower:
    image: nickfedor/watchtower
    restart: always
    container_name: watchtower
    command: --cleanup --include-restarting
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
